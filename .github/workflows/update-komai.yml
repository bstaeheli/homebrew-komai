name: Update Komai Cask

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    name: Check and update Komai cask

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fetch latest Komai release
        id: latest_release
        run: |
          # Get the latest release info
          LATEST_RELEASE=$(curl -fsSL https://api.github.com/repos/etkecc/komai/releases/latest)
          TAG=$(echo "$LATEST_RELEASE" | jq -r '.tag_name')
          VERSION=${TAG#v}

          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "ERROR: Could not determine latest Komai version"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Find the ARM64 macOS DMG download URL
          DMG_URL=$(echo "$LATEST_RELEASE" | jq -r '.assets[] | select(.name | test("macos-arm64.*\\.dmg$")) | .browser_download_url' | head -1)

          if [ -z "$DMG_URL" ]; then
            echo "ERROR: Could not find ARM64 DMG for Komai $TAG"
            exit 1
          fi

          echo "dmg_url=$DMG_URL" >> "$GITHUB_OUTPUT"
          echo "Found Komai $VERSION at $DMG_URL"

      - name: Read current cask version
        id: current
        run: |
          CURRENT_VERSION=$(grep -oP 'version "\K[^"]+' Casks/komai.rb | head -1)
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version in cask: $CURRENT_VERSION"

      - name: Calculate SHA256
        id: sha256
        if: steps.latest_release.outputs.version != steps.current.outputs.version
        env:
          DMG_URL: ${{ steps.latest_release.outputs.dmg_url }}
        run: |
          # Download the DMG and calculate SHA256
          curl -fsSL "$DMG_URL" -o komai.dmg
          if [ ! -s komai.dmg ]; then
            echo "ERROR: Downloaded DMG is empty"
            exit 1
          fi
          SHA256=$(sha256sum komai.dmg | cut -d' ' -f1)
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"
          rm komai.dmg

      - name: Update cask
        id: update
        if: steps.latest_release.outputs.version != steps.current.outputs.version
        env:
          NEW_VERSION: ${{ steps.latest_release.outputs.version }}
          NEW_SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          echo "Updating from ${{ steps.current.outputs.version }} to $NEW_VERSION"
          # The download URL is derived from the version, so only version and
          # sha256 need to change.
          sed -i "s/version \"[^\"]*\"/version \"$NEW_VERSION\"/" Casks/komai.rb
          sed -i "s/sha256 \"[a-f0-9]\{64\}\"/sha256 \"$NEW_SHA256\"/" Casks/komai.rb

      - name: Commit and push changes
        if: steps.latest_release.outputs.version != steps.current.outputs.version
        env:
          NEW_VERSION: ${{ steps.latest_release.outputs.version }}
          NEW_SHA256: ${{ steps.sha256.outputs.sha256 }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/komai.rb
          git commit -m "komai: update to $NEW_VERSION

          Updated SHA256: $NEW_SHA256"
          git push origin HEAD

      - name: Notify if up to date
        if: steps.latest_release.outputs.version == steps.current.outputs.version
        run: echo "Komai cask is already at the latest version (${{ steps.current.outputs.version }})"
